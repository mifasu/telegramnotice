1.0.1: Initial release. Adds TelegramNotice component and basic form templates.
1.0.2: Added support for `arr[]` fields to include additional values in messages.
1.0.3: Bug fixes and refactored send method.
1.1.0: Added configuration file `config/telegram.php` to support direct Telegram Bot API integration and `pechkin_secret` for fallback behavior. Added error logging.
1.1.1: Moved configuration into Backend Settings (Settings model), removed physical config file, added settings migration and improved logging. Updated docs.
1.1.2: Fix token handling and fallback behavior. Do not encode bot token in URL; persist generated `pechkin_secret`; improve error handling and logging; return accurate send status.
1.1.3: OctoberCMS 4.x compatibility. Fallback now uses canonical API v1 endpoint (POST /api/v1/pechkin/sendMessage with Authorization Bearer + X-Site-Name headers); supports DMDEV_API_BASE_URL env override. Clean imports, fix Settings model visibility, remove sensitive debug log, standardise Log facade, fix HTML template typo. Add LICENSE and marketplace-ready composer.json.
