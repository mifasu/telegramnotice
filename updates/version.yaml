1.0.1: Initial release. Adds TelegramNotice component and basic form templates.
1.0.2: Added support for arr[] fields to include additional values in messages.
1.0.3: Bug fixes and refactored send method.
1.1.0: Added direct Telegram Bot API support with pechkin_secret fallback and error logging.
1.1.1: Moved configuration into Backend Settings model, removed physical config file, added settings migration.
1.1.2: Fix direct Telegram API call, persist generated pechkin_secret, improve error handling, return accurate send status.
1.1.3: OctoberCMS 4.x compatibility. Fallback uses canonical API v1 endpoint with Bearer auth and X-Site-Name header. Supports DMDEV_API_BASE_URL env override. Fix Settings model visibility, remove debug log, add LICENSE and marketplace-ready composer.json.
1.2.0: Add MAX messenger support via platform-api.max.ru. New settings max_bot_token and max_chat_id. Messages sent to Telegram and MAX simultaneously when both configured. MAX text auto-converted from HTML to plain-text. Pechkin fallback used only when neither Telegram nor MAX is configured.
